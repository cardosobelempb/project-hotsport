name: ✨ Feature
description: Nova funcionalidade
title: "feat(<scope>): "
labels: ["feature"]
assignees: []
body:

  - type: input
    id: scope
    attributes:
      label: Escopo
      placeholder: "ex: usecases, routes, auth, payments"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: O que precisa ser criado?
      placeholder: "Descreva a funcionalidade esperada"
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Tarefas
      value: |
        - [ ] Criar schema Zod em `src/schemas/index.ts`
        - [ ] Criar use case em `src/usecases/VerbEntidade.ts`
          - [ ] Definir `InputDto` no mesmo arquivo
          - [ ] Definir `OutputDto` no mesmo arquivo
          - [ ] Mapear resultado — nunca retornar model Prisma direto
          - [ ] Sem `try/catch`
        - [ ] Criar rota em `src/routes/`
          - [ ] `withTypeProvider<ZodTypeProvider>()`
          - [ ] `tags` e `summary` no schema
          - [ ] Validar sessão com `auth.api.getSession` (se protegida)
          - [ ] Instanciar e chamar o use case
          - [ ] Tratar erros com `try/catch`
        - [ ] Adicionar erros em `src/errors/index.ts` se necessário
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: ✅ Critérios de Aceite
      description: "Defina o que precisa ser verdade para essa issue ser considerada concluída."
      placeholder: |
        - `npm run typecheck` passa sem erros
        - `npm run lint` passa sem erros
        - Zero `any` introduzido
        - ...
      value: |
        - [ ] `npm run typecheck` passa sem erros
        - [ ] `npm run lint` passa sem erros
        - [ ] Zero `any` introduzido
        - [ ] Rota documentada no Swagger com `tags` e `summary`
        - [ ] Use case com `InputDto` e `OutputDto` mapeados
        - [ ] Zero model Prisma retornado diretamente
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        > 📋 **Referências:** `AGENTS.md` · `.github/copilot-instructions.md` · `.github/instructions/conventions.instructions.md`