name: ✨ Feature
description: Nova funcionalidade
title: "feat(<scope>): "
labels: ["feature"]
assignees: []
body:

  - type: input
    id: scope
    attributes:
      label: Escopo
      placeholder: "ex: admin, auth, pagamentos, mikrotik, radius"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: O que precisa ser criado?
      placeholder: "Descreva a funcionalidade esperada"
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Tarefas
      value: |
        - [ ] Criar contrato (interface) em `backend/src/<dominio>/domain/repositories/<dominio>.repository.ts`
        - [ ] Criar use case em `backend/src/<dominio>/application/usecases/<dominio>-<acao>.usecase.ts`
          - [ ] Definir `InputDto` no mesmo arquivo
          - [ ] Definir `OutputDto` no mesmo arquivo
          - [ ] Injetar repositório via constructor — sem acesso DB direto
          - [ ] Sem `try/catch`
          - [ ] Sem imports de Fastify
          - [ ] Sem geração de JWT
          - [ ] Retornar `OutputDto` mapeado — nunca o model do banco direto
        - [ ] Criar implementação de repositório em `backend/src/<dominio>/infrastructure/repositories/`
        - [ ] Criar controller em `backend/src/<dominio>/infrastructure/controllers/<dominio>-<acao>.controller.ts`
          - [ ] 1 controller = 1 endpoint
          - [ ] Instanciar repositório e use case
          - [ ] Gerar JWT (se necessário) via `backend/src/common/infrastructure/auth/jwt.ts` (payload mínimo: `sub`)
          - [ ] Tratar erros via `AppError` respondendo `{ error, code }`
        - [ ] Criar/atualizar router em `backend/src/<dominio>/infrastructure/routes/<dominio>.router.ts`
          - [ ] 1 router por domínio
          - [ ] Registrar endpoint no router
        - [ ] Registrar router no `backend/src/server.ts` (se novo domínio)
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: ✅ Critérios de Aceite
      description: "Defina o que precisa ser verdade para essa issue ser considerada concluída."
      placeholder: |
        - `npm run typecheck` passa sem erros (backend)
        - `npm run lint` passa sem erros
        - Zero `any` introduzido
        - ...
      value: |
        - [ ] `npm run typecheck` passa sem erros (backend)
        - [ ] `npm run lint` passa sem erros
        - [ ] Zero `any` introduzido
        - [ ] Arquivos nos paths corretos (`backend/src/<dominio>/...`)
        - [ ] Use case com `InputDto` e `OutputDto` mapeados
        - [ ] Use case sem `try/catch`, sem Fastify, sem SQL direto, sem gerar JWT
        - [ ] Controller com no máximo 1 endpoint; JWT gerado via helper comum
        - [ ] Erros respondidos no formato `{ error, code }`
        - [ ] Endpoint funcionando conforme descrito
    validations:
      required: true

  - type: textarea
    id: rules
    attributes:
      label: 📐 Padrões Arquiteturais (obrigatório confirmar)
      description: "Confirme que os padrões abaixo serão seguidos nesta issue."
      value: |
        - [ ] Estrutura por domínio: `backend/src/<dominio>/domain/`, `application/`, `infrastructure/`
        - [ ] Contratos de repositório em `domain/repositories/` (sem dependências de banco)
        - [ ] Implementações de repositório em `infrastructure/repositories/`
        - [ ] 1 controller por endpoint em `infrastructure/controllers/`
        - [ ] 1 router por domínio em `infrastructure/routes/<dominio>.router.ts`
        - [ ] Use case: sem `try/catch`, sem Fastify, sem SQL/DB direto, sem gerar JWT
        - [ ] JWT gerado no controller via `backend/src/common/infrastructure/auth/jwt.ts` (payload mínimo: `sub`)
        - [ ] Erros via `AppError`; resposta HTTP no formato `{ error, code }`
        - [ ] Sem `any`; `npm run typecheck` (backend) deve passar
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        > 📋 **Referências:** `AGENTS.md` · `.github/copilot-instructions.md` · `.github/instructions/conventions.instructions.md`