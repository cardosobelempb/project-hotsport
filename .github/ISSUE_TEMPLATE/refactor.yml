name: ♻️ Refatoração
description: Melhorar código sem mudar comportamento
title: "refactor(<scope>): "
labels: ["refactor", "tech-debt"]
assignees: []
body:

  - type: input
    id: scope
    attributes:
      label: Escopo
      placeholder: "ex: routes, usecases, schemas"
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Situação atual (problema)
      placeholder: "ex: rotas contêm regras de negócio, uso de any, Zod v3..."
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Tarefas
      value: |
        - [ ] Mapear todos os arquivos afetados
        - [ ] Aplicar as mudanças seguindo `AGENTS.md`
        - [ ] Zero `any` introduzido
        - [ ] Zero regras de negócio em rotas
        - [ ] Zero `try/catch` em use cases
        - [ ] Zero model Prisma retornado diretamente
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: ✅ Critérios de Aceite
      description: "Defina o que precisa ser verdade para essa issue ser considerada concluída."
      placeholder: |
        - Comportamento externo idêntico
        - `npm run typecheck` passa sem erros
        - ...
      value: |
        - [ ] Comportamento externo idêntico ao anterior
        - [ ] `npm run typecheck` passa sem erros
        - [ ] `npm run lint` passa sem erros
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        > 📋 **Referências:** `AGENTS.md` · `.github/copilot-instructions.md` · `.github/instructions/conventions.instructions.md`