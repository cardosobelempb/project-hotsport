name: 🐛 Bug
description: Comportamento inesperado
title: "fix(<scope>): "
labels: ["bug"]
assignees: []
body:

  - type: input
    id: scope
    attributes:
      label: Escopo
      placeholder: "ex: routes/workout-plan, usecases/CreateWorkoutPlan"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: O que está acontecendo?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Como reproduzir
      placeholder: |
        1. Fazer POST /api/... com payload { ... }
        2. Receber erro 500
        3. Log: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: O que deveria acontecer?
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Tarefas
      value: |
        - [ ] Identificar a causa raiz
        - [ ] Aplicar a correção
        - [ ] Verificar se o erro está em `src/errors/index.ts`
        - [ ] Garantir que o `catch` da rota trata o erro corretamente
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: ✅ Critérios de Aceite
      description: "Defina o que precisa ser verdade para essa issue ser considerada concluída."
      placeholder: |
        - Bug não reproduz mais
        - `npm run typecheck` passa sem erros
        - ...
      value: |
        - [ ] Bug não reproduz mais
        - [ ] Nenhum comportamento existente foi quebrado
        - [ ] `npm run typecheck` passa sem erros
        - [ ] `npm run lint` passa sem erros
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        > 📋 **Referências:** `AGENTS.md` · `.github/copilot-instructions.md`